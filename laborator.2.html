<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>BMX Street Group - Piese BMX</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: white;
    color: black;
    margin: 0;
    text-align: center;
}

h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 72px;
    margin: 20px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 15px;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    transition: 0.3s;
}

.card img:hover {
    transform: scale(1.1);
}

button {
    padding: 10px;
    background: orange;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkorange;
}
</style>
</head>

<body>

<h1>BMX Street Group</h1>
<p>Elaborat de Vlad Ursu CR-252</p>

<div class="grid" id="produse"></div>

<script>
const produse = [
"Roată BMX",
"Cadru BMX",
"Ghidon BMX",
"Pedale BMX",
"Lanț BMX",
"Pinion BMX",
"Furcă BMX",
"Seat BMX",
"Frâne BMX",
"Grip-uri BMX",
"Peg-uri BMX",
"Anvelope BMX",
"Cameră roată BMX",
"Butuc BMX",
"Ax BMX",
"Headset BMX",
"BB (Bottom Bracket)",
"Șa BMX",
"Colier șa BMX",
"Protecții lanț BMX"
];

const container = document.getElementById("produse");

produse.forEach((nume, i) => {
container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/300x200/?bmx,part,${i}" alt="piesa bmx">
<h3>${nume}</h3>
<p>Preț: ${20 + i*5}€</p>
<button onclick="cumpara('${nume}')">Adaugă</button>
</div>
`;
});

function cumpara(nume) {
alert(nume + " adăugat în coș!");
}
</script>

</body>
</html>
