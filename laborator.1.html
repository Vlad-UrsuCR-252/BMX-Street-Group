<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>BMX Street Group - BMX-uri</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: white;
    color: black;
    margin: 0;
    text-align: center;
}

h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 72px;
    margin: 20px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 15px;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

button {
    padding: 10px;
    background: orange;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>BMX Street Group</h1>
<p>Elaborat de Vlad Ursu CR-252</p>

<div class="grid" id="produse"></div>

<script>
const produse = [
"Sunday Street Sweeper",
"Fit Bike Co Series One",
"Kink Launch",
"WeThePeople Nova",
"Mongoose Legion L100",
"Cult Gateway",
"Subrosa Altus",
"Haro Downtown",
"GT Slammer",
"DK Cygnus",
"Sunday Model C",
"Fit PRK",
"WeThePeople Arcade",
"Cult Devotion",
"Subrosa Tiro",
"Haro Leucadia",
"GT Performer",
"Kink Gap",
"Mongoose Legion L80",
"DK Helio"
];

const container = document.getElementById("produse");

produse.forEach((nume, i) => {
container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/300x200/?bmx,${nume.replaceAll(' ','')}" alt="bmx">
<h3>${nume}</h3>
<p>Preț: ${200 + i*15}€</p>
<button onclick="cumpara('${nume}')">Cumpără</button>
</div>
`;
});

function cumpara(nume) {
alert(nume + " adăugat în coș!");
}
</script>

</body>
</html>
