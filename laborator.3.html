<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>BMX Street Group - Îmbrăcăminte</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: white;
    color: black;
    margin: 0;
    text-align: center;
}

h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 72px;
    margin: 20px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 15px;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    transition: 0.3s;
}

.card img:hover {
    transform: scale(1.1);
}

button {
    padding: 10px;
    background: orange;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkorange;
}
</style>
</head>

<body>

<h1>BMX Street Group</h1>
<p>Elaborat de Vlad Ursu CR-252</p>

<div class="grid" id="produse"></div>

<script>
const produse = [
"Hanorac BMX",
"Tricou BMX",
"Pantaloni BMX",
"Șort BMX",
"Geacă BMX",
"Șapcă BMX",
"Căciulă BMX",
"Adidași BMX",
"Tenisi BMX",
"Sosete BMX",
"Mănuși BMX",
"Protecții genunchi",
"Protecții coate",
"Rucsac BMX",
"Centură BMX",
"Ochelari BMX",
"Jachetă impermeabilă",
"Hanorac oversized BMX",
"Pantofi skate BMX",
"Tricou long sleeve BMX"
];

const container = document.getElementById("produse");

produse.forEach((nume, i) => {
container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/300x200/?streetwear,bmx,${i}" alt="imbracaminte bmx">
<h3>${nume}</h3>
<p>Preț: ${15 + i*7}€</p>
<button onclick="cumpara('${nume}')">Cumpără</button>
</div>
`;
});

function cumpara(nume) {
alert(nume + " adăugat în coș!");
}
</script>

</body>
</html>
