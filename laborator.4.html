<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>BMX Street Group - Comunitate</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: white;
    color: black;
    margin: 0;
    text-align: center;
}

h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 72px;
    margin: 20px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 15px;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    transition: 0.3s;
}

.card img:hover {
    transform: scale(1.1);
}

button {
    padding: 10px;
    background: orange;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkorange;
}
</style>
</head>

<body>

<h1>BMX Street Group</h1>
<p>Elaborat de Vlad Ursu CR-252</p>

<div class="grid" id="comunitate"></div>

<script>
const rideri = [
"Street Rider",
"Park Rider",
"Flatland Rider",
"Beginner BMX",
"Pro Rider",
"Freestyle BMX",
"Dirt Jump Rider",
"Urban Rider",
"Night Rider",
"Competition Rider",
"Trick Master",
"Rail Specialist",
"Ramp Rider",
"Speed Rider",
"Style Rider",
"Young Rider",
"Old School Rider",
"Team Rider",
"Extreme Rider",
"BMX Influencer"
];

const container = document.getElementById("comunitate");

rideri.forEach((nume, i) => {
container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/300x200/?bmx,ride,${i}" alt="bmx rider">
<h3>${nume}</h3>
<p>Status: Activ</p>
<button onclick="join('${nume}')">Alătură-te</button>
</div>
`;
});

}
</script>

</body>
</html>
